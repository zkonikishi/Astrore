name: Build Astrore

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: Astrore-Windows
            bundles: ""
          - platform: ubuntu-22.04
            artifact: Astrore-Linux
            bundles: deb,appimage
          - platform: macos-latest
            artifact: Astrore-macOS
            bundles: app,dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend
        run: npm run build

      - name: Validate extension registry
        run: npm run registry:check

      - name: Generate platform icons
        run: npm run tauri icon public/astrore-icon.png

      - name: Build Tauri (Windows portable only)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build -- --bundles ""
        continue-on-error: true

      - name: Build Tauri (Windows exe only)
        if: matrix.platform == 'windows-latest'
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Build Tauri bundles (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Package Windows portable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force portable-package | Out-Null
          Copy-Item src-tauri/target/release/astrore.exe portable-package/Astrore.exe
          @"
          Astrore Windows Portable

          Double-click Astrore.exe to start the desktop app.
          If Windows asks for WebView2 Runtime, install it from Microsoft first.
          "@ | Set-Content portable-package/README.txt -Encoding UTF8
          Compress-Archive -Path portable-package/* -DestinationPath "Astrore_${version}_x64-portable.zip" -Force

      - name: Build web Agent
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin astrore-agent

      - name: Package Windows Agent with web UI
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force agent-package/dist | Out-Null
          Copy-Item dist/* agent-package/dist -Recurse
          Copy-Item src-tauri/target/release/astrore-agent.exe agent-package/
          Copy-Item deploy/start-agent.bat agent-package/
          Compress-Archive -Path agent-package/* -DestinationPath Astrore-Agent-Windows.zip

      - name: Package Unix Agent with web UI
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          mkdir -p agent-package/dist
          cp -R dist/. agent-package/dist/
          cp src-tauri/target/release/astrore-agent agent-package/
          cp deploy/start-agent.sh agent-package/
          chmod +x agent-package/astrore-agent agent-package/start-agent.sh
          tar -czf Astrore-Agent-${{ matrix.platform == 'ubuntu-22.04' && 'Linux' || 'macOS' }}.tar.gz -C agent-package .

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.platform != 'windows-latest' && 'src-tauri/target/release/bundle/**' || '' }}
            Astrore_*_x64-portable.zip
            Astrore-Agent-*.zip
            Astrore-Agent-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Astrore ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            Astrore_*_x64-portable.zip
            Astrore-Agent-*.zip
            Astrore-Agent-*.tar.gz
